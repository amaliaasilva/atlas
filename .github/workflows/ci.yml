name: CI — Testes e Lint

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Backend: lint + type-check + testes
  # ─────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_DB: atlas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependências
        run: pip install -r requirements.txt ruff mypy

      - name: Ruff — Lint
        run: ruff check . --output-format=github

      - name: Ruff — Format check
        run: ruff format . --check

      - name: Mypy — Type check
        run: mypy app/ --ignore-missing-imports --no-error-summary
        continue-on-error: true

      - name: Pytest — Testes unitários + integração
        env:
          DATABASE_URL: postgresql://atlas:atlas@localhost:5432/atlas_test
          SECRET_KEY: test-secret-key-32-chars-minimum!!
          ENVIRONMENT: test
        run: |
          pytest tests/ \
            -x \
            -v \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=test-results.xml

      - name: Upload cobertura para Codecov
        uses: codecov/codecov-action@v4
        if: success()
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Publicar resultados dos testes
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend Tests
          path: backend/test-results.xml
          reporter: java-junit
          fail-on-error: false

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend: build + type-check
  # ─────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        node-version: ["20", "22"]

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci --prefer-offline --no-audit

      - name: TypeScript — Type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint
        continue-on-error: true

      - name: Next.js Build (export estático)
        env:
          NEXT_PUBLIC_API_URL: https://atlas-backend-placeholder.run.app
          NEXT_PUBLIC_ENV: test
        run: npm run build

      - name: Verificar tamanho do bundle
        run: |
          echo "── Bundle sizes ──"
          du -sh out/ 2>/dev/null || echo "Diretório 'out' não encontrado"
          find out -name "*.js" -size +500k 2>/dev/null | while read f; do
            echo "⚠ Arquivo grande: $f ($(du -sh "$f" | cut -f1))"
          done

      - name: Upload artifact (out/)
        uses: actions/upload-artifact@v4
        if: matrix.node-version == '22'
        with:
          name: frontend-build-${{ github.sha }}
          path: frontend/out/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # Security scan
  # ─────────────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm audit (frontend)
        working-directory: frontend
        run: npm audit --audit-level=high --production
        continue-on-error: true

      - name: Trivy — Vulnerability scan (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: table
          exit-code: 0
