name: CD — Deploy Backend (Cloud Run)

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: Ambiente de deploy
        required: true
        default: production
        type: choice
        options: ["production", "staging"]
      tag:
        description: Tag da imagem (deixe vazio para usar o SHA do commit)
        required: false

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_PROJECT: atlasfinance
  GCP_REGION: southamerica-east1
  CLOUD_RUN_SERVICE: atlas-backend
  IMAGE_NAME: gcr.io/atlasfinance/atlas-backend
  CLOUDSQL_INSTANCE: atlasfinance:southamerica-east1:atlas-db

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Testes obrigatórios antes de buildar
  # ─────────────────────────────────────────────────────────────────────────
  tests:
    name: Testes Backend
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_DB: atlas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependências
        run: pip install -r requirements.txt ruff

      - name: Pytest
        env:
          DATABASE_URL: postgresql://atlas:atlas@localhost:5432/atlas_test
          SECRET_KEY: test-secret-key-minimum-32-chars!!
          ENVIRONMENT: test
        run: pytest tests/ -x -q --tb=short

  # ─────────────────────────────────────────────────────────────────────────
  # Build e Push da imagem Docker
  # ─────────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push Docker → GCR
    runs-on: ubuntu-24.04
    needs: tests
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
      full-image: ${{ steps.meta.outputs.full-image }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Metadata da imagem
        id: meta
        run: |
          TAG="${{ inputs.tag || '' }}"
          if [[ -z "$TAG" ]]; then
            TAG="$(git rev-parse --short HEAD)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "full-image=${{ env.IMAGE_NAME }}:$TAG" >> "$GITHUB_OUTPUT"
          echo "Imagem: ${{ env.IMAGE_NAME }}:$TAG"

      - name: Autenticar no GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configurar gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Configurar Docker para GCR
        run: gcloud auth configure-docker --quiet

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache de layers Docker
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('backend/Dockerfile', 'backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build e Push
        uses: docker/build-push-action@v5
        with:
          context: backend/
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: |
            type=local,src=/tmp/.buildx-cache
            type=registry,ref=${{ env.IMAGE_NAME }}:latest
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          build-args: |
            BUILD_SHA=${{ github.sha }}

      # Cache workaround (evita acúmulo infinito)
      - name: Rotacionar cache Buildx
        run: |
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache 2>/dev/null || true

      - name: Container vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.full-image }}
          format: table
          severity: CRITICAL
          exit-code: 0  # não bloqueia, mas reporta

  # ─────────────────────────────────────────────────────────────────────────
  # Deploy no Cloud Run
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy Cloud Run
    runs-on: ubuntu-24.04
    needs: build-push
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Autenticar no GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configurar gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}
      - name: Definir runtime SA do Cloud Run
        run: |
          # Garante que o serviço usa atlas-deployer como SA de execução
          # e que o Cloud SQL está anexado ao serviço antes do deploy.
          gcloud run services update "${{ env.CLOUD_RUN_SERVICE }}" \
            --region="${{ env.GCP_REGION }}" \
            --service-account="${{ secrets.WIF_SERVICE_ACCOUNT }}" \
            --add-cloudsql-instances="${{ env.CLOUDSQL_INSTANCE }}" \
            --project="${{ env.GCP_PROJECT }}" 2>/dev/null || \
          echo "Serviço não existe ainda — será criado pelo step de deploy"
      - name: Deploy no Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          image: ${{ needs.build-push.outputs.full-image }}
          region: ${{ env.GCP_REGION }}
          flags: >-
            --allow-unauthenticated
            --port=8000
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=10
            --concurrency=80
            --timeout=60
            --service-account=${{ secrets.WIF_SERVICE_ACCOUNT }}
            --add-cloudsql-instances=${{ env.CLOUDSQL_INSTANCE }}
          env_vars: |-
            ENVIRONMENT=production
            CORS_ORIGINS=https://atlasfinance.web.app,https://atlasfinance.firebaseapp.com
          secrets: |-
            DATABASE_URL=atlas-database-url:latest
            SECRET_KEY=atlas-secret-key:latest
            GCS_BUCKET_NAME=atlas-gcs-bucket:latest

      - name: Aguardar serviço estar saudável
        run: |
          echo "URL deployada: ${{ steps.deploy.outputs.url }}"
          echo "Aguardando serviço iniciar (30s)..."
          sleep 30

          MAX_ATTEMPTS=10
          ATTEMPT=0
          until curl -sf "${{ steps.deploy.outputs.url }}/health" \
              -o /dev/null --max-time 10; do
            ATTEMPT=$((ATTEMPT + 1))
            if [[ $ATTEMPT -ge $MAX_ATTEMPTS ]]; then
              echo "❌ Health check falhou após ${MAX_ATTEMPTS} tentativas"
              exit 1
            fi
            echo "Tentativa ${ATTEMPT}/${MAX_ATTEMPTS} — aguardando 15s..."
            sleep 15
          done
          echo "✅ Serviço respondendo!"

      - name: Executar migrações Alembic
        run: |
          # Executa migrations via Cloud Run Job (one-off)
          gcloud run jobs create atlas-migrate-${{ needs.build-push.outputs.image-tag }} \
            --image="${{ needs.build-push.outputs.full-image }}" \
            --region="${{ env.GCP_REGION }}" \
            --project="${{ env.GCP_PROJECT }}" \
            --command="alembic" \
            --args="upgrade,head" \
            --service-account="${{ secrets.WIF_SERVICE_ACCOUNT }}" \
            --set-secrets="DATABASE_URL=atlas-database-url:latest" \
            --add-cloudsql-instances="${{ env.CLOUDSQL_INSTANCE }}" \
            --max-retries=1 \
            --wait \
            2>/dev/null || \
          gcloud run jobs execute atlas-migrate-${{ needs.build-push.outputs.image-tag }} \
            --region="${{ env.GCP_REGION }}" \
            --project="${{ env.GCP_PROJECT }}" \
            --wait || true

      - name: Notificar resultado
        uses: actions/github-script@v7
        if: always()
        continue-on-error: true
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            const tag = '${{ needs.build-push.outputs.image-tag }}';
            const url = '${{ steps.deploy.outputs.url }}';
            const msg = [
              `${status} Backend deploy ${{ job.status }}`,
              `Imagem: \`${{ env.IMAGE_NAME }}:${tag}\``,
              url ? `URL: ${url}` : '',
              url ? `Docs: ${url}/docs` : '',
            ].filter(Boolean).join('\n');
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: msg,
            });

  # ─────────────────────────────────────────────────────────────────────────
  # Rollback automático se health check falhar
  # ─────────────────────────────────────────────────────────────────────────
  rollback-on-failure:
    name: Rollback (se necessário)
    runs-on: ubuntu-24.04
    needs: deploy
    if: failure()

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Autenticar no GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configurar gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Rollback para revisão anterior
        run: |
          echo "⚠ Deploy falhou — iniciando rollback..."
          # Lista revisões e faz rollback para a anterior estável
          PREV_REVISIONS=$(gcloud run revisions list \
            --service="${{ env.CLOUD_RUN_SERVICE }}" \
            --region="${{ env.GCP_REGION }}" \
            --project="${{ env.GCP_PROJECT }}" \
            --format="value(name)" \
            --filter="status.conditions.type=Ready AND status.conditions.status=True" \
            --sort-by="~metadata.creationTimestamp" \
            --limit=2 | tail -n 1)

          if [[ -n "$PREV_REVISIONS" ]]; then
            echo "Revertendo para: $PREV_REVISIONS"
            gcloud run services update-traffic "${{ env.CLOUD_RUN_SERVICE }}" \
              --region="${{ env.GCP_REGION }}" \
              --project="${{ env.GCP_PROJECT }}" \
              --to-revisions="${PREV_REVISIONS}=100"
            echo "✅ Rollback concluído para $PREV_REVISIONS"
          else
            echo "❌ Nenhuma revisão anterior encontrada para rollback"
          fi
