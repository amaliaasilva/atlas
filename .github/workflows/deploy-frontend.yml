name: CD — Deploy Frontend (Cloud Run + Firebase Hosting)

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: Ambiente de deploy
        required: true
        default: production
        type: choice
        options: ["production", "staging"]

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  GCP_PROJECT: atlasfinance
  GCP_REGION: southamerica-east1
  CLOUD_RUN_SERVICE: atlas-frontend
  IMAGE_NAME: gcr.io/atlasfinance/atlas-frontend
  FIREBASE_SITE: atlasfinance

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Build & Push imagem Docker para GCR
  # ─────────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push Docker (Next.js standalone)
    runs-on: ubuntu-24.04
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Metadata
        id: meta
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Autenticar no GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configurar gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Configurar Docker para GCR
        run: gcloud auth configure-docker --quiet

      - name: Build Docker (Next.js standalone)
        working-directory: frontend
        run: |
          docker build \
            --tag "${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}" \
            --tag "${{ env.IMAGE_NAME }}:latest" \
            --build-arg NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
            --cache-from "${{ env.IMAGE_NAME }}:latest" \
            .

      - name: Push para Google Container Registry
        run: |
          docker push "${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}"
          docker push "${{ env.IMAGE_NAME }}:latest"

  # ─────────────────────────────────────────────────────────────────────────
  # Deploy no Cloud Run
  # ─────────────────────────────────────────────────────────────────────────
  deploy-cloud-run:
    name: Deploy Cloud Run (atlas-frontend)
    runs-on: ubuntu-24.04
    needs: build-push
    environment:
      name: production
      url: https://${{ env.FIREBASE_SITE }}.web.app

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Autenticar no GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configurar gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy no Cloud Run
        run: |
          gcloud run deploy "${{ env.CLOUD_RUN_SERVICE }}" \
            --image "${{ env.IMAGE_NAME }}:${{ needs.build-push.outputs.image-tag }}" \
            --platform managed \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ env.GCP_PROJECT }}" \
            --allow-unauthenticated \
            --port 3000 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --concurrency 100 \
            --timeout 60 \
            --service-account "${{ secrets.WIF_SERVICE_ACCOUNT }}" \
            --set-env-vars "NODE_ENV=production,NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" \
            --quiet

  # ─────────────────────────────────────────────────────────────────────────
  # Deploy Firebase Hosting (aponta para Cloud Run)
  # ─────────────────────────────────────────────────────────────────────────
  deploy-hosting:
    name: Deploy Firebase Hosting
    runs-on: ubuntu-24.04
    needs: deploy-cloud-run

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Autenticar no GCP (ADC para Firebase CLI)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools@latest --no-audit

      - name: Firebase Deploy — Hosting (rewrite → Cloud Run)
        working-directory: frontend
        run: |
          firebase deploy \
            --only "hosting:${{ env.FIREBASE_SITE }}" \
            --project "${{ env.GCP_PROJECT }}" \
            --non-interactive \
            --message "Deploy $(git rev-parse --short HEAD)"

      - name: Health check
        run: |
          sleep 30
          STATUS=$(node -e "
            const https = require('https');
            const req = https.get('https://${{ env.FIREBASE_SITE }}.web.app/', r => {
              process.stdout.write(String(r.statusCode)); process.exit(0);
            });
            req.on('error', () => { process.stdout.write('0'); process.exit(1); });
            req.setTimeout(20000, () => { process.stdout.write('0'); process.exit(1); });
          ")
          echo "HTTP: $STATUS"
          [[ "$STATUS" =~ ^(200|301|302)$ ]] && echo "✅ OK" || exit 1

      - name: Comentar no commit
        uses: actions/github-script@v7
        if: always()
        continue-on-error: true
        with:
          script: |
            const ok = '${{ job.status }}' === 'success';
            github.rest.repos.createCommitComment({
              owner: context.repo.owner, repo: context.repo.repo,
              commit_sha: context.sha,
              body: `${ok ? '✅' : '❌'} Frontend deploy ${{ job.status }}\nURL: https://${{ env.FIREBASE_SITE }}.web.app`,
            });
