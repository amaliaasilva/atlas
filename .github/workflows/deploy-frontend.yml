name: CD — Deploy Frontend (Firebase Hosting)

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: Ambiente de deploy
        required: true
        default: production
        type: choice
        options: ["production", "staging"]

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: false  # Nunca cancela deploys em andamento

env:
  NODE_VERSION: "22"
  GCP_PROJECT: atlasfinance
  FIREBASE_SITE: atlasfinance

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Validar se CI passou antes de deployar
  # ─────────────────────────────────────────────────────────────────────────
  check-ci:
    name: Verificar CI
    runs-on: ubuntu-24.04
    steps:
      - name: Verificar status do último CI
        uses: actions/github-script@v7
        with:
          script: |
            const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              branch: context.ref.replace('refs/heads/', ''),
              per_page: 1,
            });
            const latest = runs.workflow_runs[0];
            if (latest && latest.conclusion === 'failure') {
              core.setFailed('CI falhou — deploy bloqueado');
            } else {
              core.info('CI OK — prosseguindo com deploy');
            }

  # ─────────────────────────────────────────────────────────────────────────
  # Build do Frontend
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build Next.js
    runs-on: ubuntu-24.04
    needs: check-ci
    outputs:
      build-sha: ${{ steps.meta.outputs.sha }}

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Metadata
        id: meta
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências (ci — reproducível)
        run: npm ci --prefer-offline --no-audit

      - name: Build export estático
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_ENV: ${{ inputs.environment || 'production' }}
          NODE_ENV: production
        run: npm run build

      - name: Verificar conteúdo do build
        run: |
          echo "── Arquivos gerados ──"
          find out -type f | sort | head -40
          echo "── Tamanho total ──"
          du -sh out/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ steps.meta.outputs.sha }}
          path: frontend/out/
          retention-days: 3
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────
  # Deploy Preview (PRs — não deployar em main automático)
  # ─────────────────────────────────────────────────────────────────────────
  deploy-preview:
    name: Deploy Preview (Firebase)
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ needs.build.outputs.build-sha }}
          path: frontend/out/

      - name: Deploy preview no Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ env.GCP_PROJECT }}
          expires: 7d
          channelId: ""   # auto-generated preview channel

  # ─────────────────────────────────────────────────────────────────────────
  # Deploy Production
  # ─────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy Production (Firebase Hosting)
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://${{ env.FIREBASE_SITE }}.web.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools@latest --no-audit

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ needs.build.outputs.build-sha }}
          path: frontend/out/

      - name: Verificar autenticidade do artifact
        run: |
          echo "── Resumo do build ──"
          find frontend/out -type f | wc -l
          du -sh frontend/out/

      - name: Firebase Deploy — Hosting
        working-directory: frontend
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase deploy \
            --only "hosting:${{ env.FIREBASE_SITE }}" \
            --project "${{ env.GCP_PROJECT }}" \
            --token "${{ secrets.FIREBASE_TOKEN }}" \
            --non-interactive \
            --message "Deploy ${{ needs.build.outputs.build-sha }} — ${{ github.event.head_commit.message }}"

      - name: Health check pós-deploy
        run: |
          echo "Aguardando propagação CDN (30s)..."
          sleep 30
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
            --max-time 20 \
            "https://${{ env.FIREBASE_SITE }}.web.app/" 2>/dev/null || echo "000")
          echo "HTTP Status: $HTTP_CODE"
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "⚠ Health check retornou $HTTP_CODE"
            exit 1
          fi
          echo "✅ Deploy verificado com sucesso!"

      - name: Notificar deploy no commit
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            const msg = `${status} Frontend deploy ${{ job.status }}\n` +
              `Commit: \`${{ needs.build.outputs.build-sha }}\`\n` +
              `URL: https://${{ env.FIREBASE_SITE }}.web.app`;
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: msg,
            });
